services:
  postgres:
    image: postgres:16-alpine
    container_name: nps-choice-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nps_choice_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nps_choice_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
